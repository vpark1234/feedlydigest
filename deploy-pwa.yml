name: Deploy PWA

on:
  # Auto-trigger after the daily digest finishes (success only)
  workflow_run:
    workflows: ["Daily Digest"]
    types: [completed]

  # Also allow a manual "Run workflow" button on the Actions tab
  workflow_dispatch:

# Needs write access to push docs/ back to main
permissions:
  contents: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    # Skip if triggered by a failed digest run
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Full history not needed; fetch latest main
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build PWA
        run: python build_pwa.py

      - name: Commit and push docs/
        run: |
          git config user.name  "FeedlyVP Bot"
          git config user.email "actions@github.com"
          git add docs/
          # Only commit when something actually changed
          git diff --staged --quiet \
            && echo "No PWA changes — skipping commit." \
            || git commit -m "chore: rebuild PWA [skip ci]"
          git push
