name: Weekly Digest

on:
  # 15:30 UTC = 7:30 AM PST (winter) / 8:30 AM PDT (summer), every Sunday
  schedule:
    - cron: '30 15 * * 0'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-weekly-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python weekly_digest.py

      - name: Commit updated digest_log.json
        run: |
          git config user.name "FeedlyVP Bot"
          git config user.email "actions@github.com"
          git add digest_log.json
          git diff --staged --quiet \
            && echo "No log changes to commit." \
            || git commit -m "chore: update weekly digest log [skip ci]"
          git push

      - name: Send failure alert
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python - <<'EOF'
          import asyncio, os
          from telegram import Bot
          asyncio.run(Bot(os.environ["TELEGRAM_BOT_TOKEN"]).send_message(
              chat_id=os.environ["TELEGRAM_CHAT_ID"],
              text="⚠️ FeedlyVP weekly digest failed — check logs at https://github.com/vickypark/feedlydigest/actions",
          ))
          print("Failure alert sent to Telegram.")
          EOF
