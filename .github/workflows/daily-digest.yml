name: Daily Digest

on:
  # 15:30 UTC = 7:30 AM PST (winter) / 8:30 AM PDT (summer)
  schedule:
    - cron: '30 15 * * *'

  # Lets you click "Run workflow" on the Actions tab any time.
  workflow_dispatch:

# Required so the job can push the updated state files back to the repo.
permissions:
  contents: write

jobs:
  run-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python digest.py

      - name: Commit updated state files
        run: |
          git config user.name "FeedlyVP Bot"
          git config user.email "actions@github.com"
          git add seen_urls.json digest_log.json
          # Only commit if something actually changed
          git diff --staged --quiet \
            && echo "No state changes to commit." \
            || git commit -m "chore: update digest state [skip ci]"
          git fetch origin main
          git rebase origin/main
          git push

      - name: Send failure alert
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python - <<'EOF'
          import asyncio, os
          from telegram import Bot
          asyncio.run(Bot(os.environ["TELEGRAM_BOT_TOKEN"]).send_message(
              chat_id=os.environ["TELEGRAM_CHAT_ID"],
              text="⚠️ FeedlyVP failed today — check logs at https://github.com/vickypark/feedlydigest/actions",
          ))
          print("Failure alert sent to Telegram.")
          EOF
