e tech workers training their own AI replacements and the pushback against \"autonomous\" AI terminology both signal that organizations need honest frameworks for AI capabilities rather than aspirational ones. Meanwhile, significant technical breakthroughs in reasoning coordination (LACE), memory efficiency (KV cache compression), and selective fine-tuning (Aletheia) are maturing the infrastructure needed for practical enterprise AI deployment, moving beyond proof-of-concept toward production-ready systems. For ERP consultants and enterprise buyers, this means the window is closing on AI experimentation and opening on strategic implementation—but success will depend on realistic expectations, robust change management, and technical architectures that can scale efficiently rather than simply scale expensively.","articles":[{"title":"Monday Morning Moan - stop saying autonomy, before things really get out of control","url":"https://diginomica.com/monday-morning-moan-stop-saying-autonomy-things-really-get-out-control","source":"Diginomica","score":8,"summary":"Article challenges the dangerous misuse of 'autonomous' terminology in AI discourse, arguing it creates unrealistic expectations about AI agency capabilities. Focuses on the critical distinction between AI assistance and true autonomy, with implications for enterprise AI deployment and regulation.","category":"Enterprise & ERP"},{"title":"Chinese tech workers are starting to train their AI doubles–and pushing back","url":"https://www.technologyreview.com/2026/04/20/1136149/chinese-tech-workers-ai-colleagues/","source":"MIT Technology Review","score":9,"summary":"Chinese tech workers are being required to train AI agents to replace themselves, creating workforce tensions and highlighting the real-world deployment of AI automation in enterprise settings. This represents a significant shift in how AI is being implemented organizationally, with workers directly participating in their own potential replacement.","category":"Tech Strategy & Analysis"},{"title":"LACE: Lattice Attention for Cross-thread Exploration","url":"https://arxiv.org/abs/2604.15529","source":"arXiv - AI","score":8,"summary":"LACE introduces a novel framework that enables parallel reasoning paths in large language models to interact and share insights during inference, transforming isolated reasoning into coordinated parallel processes. This represents a significant advancement in AI agent systems by allowing concurrent reasoning threads to correct each other's mistakes.","category":"AI & Research"},{"title":"The Spectral Geometry of Thought: Phase Transitions, Instruction Reversal, Token-Level Dynamics, and Perfect Correctness Prediction in How Transformers Reason","url":"https://arxiv.org/abs/2604.15350","source":"arXiv - Machine Learning","score":8,"summary":"Researchers identify seven core phenomena in how transformer models exhibit 'spectral phase transitions' in their hidden activation spaces when reasoning versus recalling facts, analyzing 11 models across 5 architecture families. The work reveals fundamental insights into how large language models process different types of cognitive tasks at the token level, with implications for understanding and improving AI reasoning capabilities.","category":"AI & Research"},{"title":"Sequential KV Cache Compression via Probabilistic Language Tries: Beyond the Per-Vector Shannon Limit","url":"https://arxiv.org/abs/2604.15356","source":"arXiv - Machine Learning","score":8,"summary":"Research presents a novel approach to KV cache compression that exploits the sequential nature of transformer data, potentially moving beyond current entropy limits by leveraging the model's understanding of language structure. This could significantly improve memory efficiency in large language model deployment, addressing a key bottleneck in AI system scalability.","category":"AI & Research"},{"title":"DeepER-Med: Advancing Deep Evidence-Based Research in Medicine Through Agentic AI","url":"https://arxiv.org/abs/2604.15456","source":"arXiv - AI","score":7,"summary":"Research paper presents DeepER-Med, an agentic AI system for evidence-based medical research that addresses trustworthiness and transparency issues in healthcare AI adoption. The system integrates AI agents with multi-hop information retrieval and reasoning while providing explicit criteria for evidence appraisal.","category":"AI & Research"},{"title":"GIST: Multimodal Knowledge Extraction and Spatial Grounding via Intelligent Semantic Topology","url":"https://arxiv.org/abs/2604.15495","source":"arXiv - AI","score":7,"summary":"GIST presents a new approach for spatial grounding in complex environments using Vision-Language Models, addressing challenges in retail, warehouses, and hospitals. This advances embodied AI capabilities for navigation in semantically-rich, cluttered spaces where traditional computer vision struggles.","category":"AI & Research"},{"title":"Bureaucratic Silences: What the Canadian AI Register Reveals, Omits, and Obscures","url":"https://arxiv.org/abs/2604.15514","source":"arXiv - AI","score":7,"summary":"Academic analysis of Canada's Federal AI Register examining how government transparency tools shape accountability boundaries for AI systems. The research uses systematic framework analysis to reveal what government AI registers reveal and obscure about algorithmic decision-making in public sector.","category":"AI & Research"},{"title":"Preregistered Belief Revision Contracts","url":"https://arxiv.org/abs/2604.15558","source":"arXiv - AI","score":7,"summary":"Research introduces PBRC protocol to prevent dangerous conformity effects in multi-agent AI systems where agents may converge on false conclusions due to social influence rather than evidence. The mechanism separates communication from belief revision to maintain epistemic integrity in deliberative AI systems.","category":"AI & Research"},{"title":"Aletheia: Gradient-Guided Layer Selection for Efficient LoRA Fine-Tuning Across Architectures","url":"https://arxiv.org/abs/2604.15351","source":"arXiv - Machine Learning","score":7,"summary":"Aletheia introduces a gradient-guided method to selectively apply LoRA adapters only to the most task-relevant transformer layers, making fine-tuning more efficient. This represents a meaningful optimization for enterprise deployment of large language models where compute efficiency directly impacts business economics.","category":"AI & Research"}]},{"type":"daily","date":"2026-04-20","run_at":"2026-04-20T16:38:57.385994+00:00","feeds_fetched":15,"feeds_failed":0,"articles_scored":42,"articles_sent":10,"telegram_messages_sent":12,"big_picture":"**Today's Big Picture**\n\nEnterprise software is rapidly shifting from traditional automation to agentic AI systems that operate autonomously, as evidenced by Adobe's CX Enterprise launch and Publicis's \"transformation complete\" positioning, signaling that the next competitive battleground will be who can deploy self-managing AI workflows most effectively. The infrastructure reality check is hitting hard—from OpenAI halting UK data centers due to energy costs to the broader question of who pays for AI's massive electricity demands—forcing enterprises to factor infrastructure economics into their AI strategies rather than just focusing on software capabilities. For ERP consultants and enterprise buyers, this means the window for traditional system implementations is closing fast, and the focus must shift to AI-native platforms that can handle autonomous operations while planning for the substantial infrastructure investments required to support these next-generation systems.","articles":[{"title":"Adobe Summit 2026 - Adobe gives CX an agentic makeover with the launch of CX Enterprise","url":"https://diginomica.com/adobe-summit-2026-adobe-gives-cx-agentic-makeover-launch-cx-enterprise","source":"Diginomica","score":8,"summary":"Adobe launches CX Enterprise with agentic AI automations and mul const APP = {
  data:     [],        // sorted newest-first
  screen:   'today',

  query:    '',

/* ═══════════════════════════════════════════════════════════
   UTILS
   ══════════════════════════════════════════════════════════ */
const todayStr = () => new Date().toISOString().slice(0, 10);

function scoreColor(s) {
  if (s >= 10) return '#00A550';
  if (s >=  9) return '#0066CC';
  if (s >=  8) return '#6B46C1';
  return '#D47C0A';
}
function scoreBg(s) {
  if (s >= 10) return '#DFFAED';
  if (s >=  9) return '#DCEEFF';
  if (s >=  8) return '#EDE9FB';
  return '#FEF3E2';
}
function scoreEmoji(s) {
  if (s >= 10) return '🔥';
  if (s >=  9) return '⭐';
  if (s >=  8) return '🔵';
  return '🟢';
}

function fmtDate(str) {
  if (!str) return '';
  const d = new Date(str + 'T12:00:00');
  return d.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
}
function fmtDateShort(str) {
  if (!str) return '';
  const t = todayStr();
  const yest = new Date(); yest.setDate(yest.getDate() - 1);
  const yesterdayStr = yest.toISOString().slice(0, 10);
  if (str === t)           return 'Today';
  if (str === yesterdayStr) return 'Yesterday';
  const d = new Date(str + 'T12:00:00');
  return d.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' });
}
function fmtDateMed(str) {
  if (!str) return '';
  const d = new Date(str + 'T12:00:00');
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric' });
}

function esc(s) {
  return String(s || '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function getCategories(articles) {
  return [...new Set(articles.map(a => a.category).filter(Boolean))].sort();
}
function topScore(articles) {
  return articles.reduce((m, a) => Math.max(m, a.score || 0), 0);
}

/* ═══════════════════════════════════════════════════════════
   RENDER PIECES
   ══════════════════════════════════════════════════════════ */
function heroHTML(entry) {
  return `
<div class="hero">
  <div class="hero-eyebrow">Today's Big Picture</div>
  <div class="hero-body">${esc(entry.big_picture || 'No summary available.')}</div>
  <div class="hero-footer">${fmtDate(entry.date)}</div>
</div>`;
}

function statsHTML(entry) {
  const arts = entry.articles || [];
  const cats = getCategories(arts);
  const top  = topScore(arts);
  const sc   = scoreColor(top);
  return `
<div class="stats">
  <div class="stat">
    <span class="stat-val">${arts.length}</span>
    <span class="stat-lbl">Articles</span>
  </div>
  <div class="stat">
    <span class="stat-val">${cats.length}</span>
    <span class="stat-lbl">Topics</span>
  </div>
  <div class="stat">
    <span class="stat-val" style="color:${sc}">${scoreEmoji(top)} ${top}</span>
    <span class="stat-lbl">Top Score</span>
  </div>
</div>`;
}

function tabsHTML(articles, active) {
  const cats = getCategories(articles);
  const all  = ['all', ...cats];
  return `
<div class="tabs-scroll">
  <div class="tabs" id="cat-tabs">
    ${all.map(c => `<button class="tab${c === active ? ' active' : ''}" data-c="${esc(c)}">${c === 'all' ? 'All' : esc(c)}</button>`).join('')}
  </div>
</div>`;
}

function cardHTML(article, uid) {
  const s    = article.score || 7;
  const col  = scoreColor(s);
  const bg   = scoreBg(s);
  const url  = esc(article.url || '#');
  const tit  = esc(article.title || 'Untitled');
  const src  = esc(article.source || '');
  const cat  = article.category ? `<span class="dot"></span>${esc(article.category)}` : '';
  const sum  = esc(article.summary || '');
  const why  = article.why ? `
    <div class="card-divider"></div>
    <div class="card-why">💡 ${esc(article.why)}</div>` : '';
  const safe = esc(article.title || '').replace(/&#39;/g,"'");

  return `
<div class="card" id="${uid}">
  <div class="card-top">
    <div class="card-source">${src}${cat}</div>
    <div class="badge" style="background:${bg};color:${col}">${s}</div>
  </div>
  <a class="card-title" href="${url}" target="_blank" rel="noopener noreferrer">${tit}</a>
  <div class="card-summary">${sum}</div>
  <div class="card-expand" id="exp-${uid}">
    ${why}
    <div class="card-actions">
      <a class="btn-read" href="${url}" target="_blank" rel="noopener noreferrer">Read Article →</a>
      <button class="btn-share" data-url="${url}" data-title="${esc(article.title || '')}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/>
          <polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/>
        </svg>
      </button>
    </div>
  </div>
  <button class="card-toggle" id="tog-${uid}" data-uid="${uid}">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <polyline points="6 9 12 15 18 9"/>
    </svg>
    <span>More</span>
  </button>
</div>`;
}

<div class="skel-card">
  <div class="skel skel-row" style="width:42%;height:11px"></div>
  <div class="skel skel-row" style="width:84%;height:17px;margin-bottom:10px"></div>

/* ═══════════════════════════════════════════════════════════
   SCREEN RENDERERS
   ══════════════════════════════════════════════════════════ */
function renderToday() {
  const el = document.getElementById('today-inner');
  const t  = todayStr();
  const entry = APP.data.find(d => d.date === t) || APP.data[0];

  if (!entry) {
    el.innerHTML = `
<div class="empty">
  <div class="empty-icon">📬</div>
  <div class="empty-title">No digest yet today</div>
  <div class="empty-body">Check back after 7:30 AM PST</div>
</div>`;
    return;
  }

  const stale = entry.date !== t
    ? `<div class="stale-warn">⚠️ Showing last digest from <strong>${fmtDateShort(entry.date)}</strong> — today's hasn't run yet</div>`
    : '';

  const arts     = entry.articles || [];
  const filtered = APP.cat === 'all' ? arts : arts.filter(a => a.category === APP.cat);
  const cards    = filtered.length
    ? filtered.map((a, i) => cardHTML(a, `t${i}`)).join('')
    : `<div class="empty"><div class="empty-icon">🔎</div><div class="empty-title">No articles in this category</div></div>`;

  el.innerHTML = heroHTML(entry) + statsHTML(entry) + stale + tabsHTML(arts, APP.cat) + cards;

  // Category tab listeners (delegated to tab container)
  document.getElementById('cat-tabs')?.addEventListener('click', e => {
    const btn = e.target.closest('.tab');
    if (!btn) return;
    APP.cat = btn.dataset.c;
    renderToday();
    // scroll to tabs
    requestAnimationFrame(() => {
      document.querySelector('.tabs-scroll')?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    });
  });

  attachCardListeners(el);
}

function renderWeek() {
  const el   = document.getElementById('week-inner');
  const week = APP.data.slice(0, 7);

  if (!week.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">📅</div><div class="empty-title">No digests this week</div><div class="empty-body">Digests run daily at 7:30 AM PST</div></div>`;
    return;
  }

  const t = todayStr();
  let html = '<div style="height:6px"></div>';

  week.forEach(entry => {
    const arts   = entry.articles || [];
    const isToday = entry.date === t;
    html += `
<div class="day-group">
  <div class="day-hdr" onclick="toggleDay(this)">
    <div>
      <div class="day-label">${fmtDateShort(entry.date)}${isToday ? '<span class="today-badge">NEW</span>' : ''}</div>
      <div class="day-sub">${arts.length} article${arts.length !== 1 ? 's' : ''} · Top ${scoreEmoji(topScore(arts))} ${topScore(arts)}</div>
    </div>
    <svg class="day-caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <polyline points="6 9 12 15 18 9"/>
    </svg>
  </div>
  <div class="day-articles" id="da-${entry.date}">
    ${arts.map((a, i) => cardHTML(a, `w-${entry.date}-${i}`)).join('')}
  </div>
</div>`;
  });

  el.innerHTML = html;
  attachCardListeners(el);
}

function renderArchive() {
  const el = document.getElementById('archive-inner');
  const q  = APP.query.toLowerCase().trim();
  const t  = todayStr();

  if (!APP.data.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">🗄️</div><div class="empty-title">No archived digests</div><div class="empty-body">Your digest history will appear here</div></div>`;
    return;
  }

  // Flatten all articles with date context
  let all = [];
  APP.data.forEach(entry => {
    (entry.articles || []).forEach((a, i) => {
      all.push({ ...a, _date: entry.date, _uid: `a-${entry.date}-${i}` });
    });
  });

  if (q) {
    all = all.filter(a =>
      (a.title    || '').toLowerCase().includes(q) ||
      (a.summary  || '').toLowerCase().includes(q) ||
      (a.source   || '').toLowerCase().includes(q) ||
      (a.category || '').toLowerCase().includes(q) ||
      (a.why      || '').toLowerCase().includes(q)
    );
  }

  if (!all.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">No results</div><div class="empty-body">Try a different search term</div></div>`;
    return;
  }

  // Group by date
  const byDate = {};
  all.forEach(a => { (byDate[a._date] = byDate[a._date] || []).push(a); });

  let html = '';
  Object.keys(byDate)
    .sort((a, b) => b > a ? 1 : -1)
    .forEach(date => {
      const arts = byDate[date];
      const isToday = date === t;
      html += `<div class="section-hdr">${isToday ? 'Today · ' : ''}${fmtDateShort(date)}  ·  ${arts.length} article${arts.length !== 1 ? 's' : ''}</div>`;
      html += arts.map(a => cardHTML(a, a._uid)).join('');
    });

  el.innerHTML = html;
  attachCardListeners(el);
}

/* ═══════════════════════════════════════════════════════════
   INTERACTIONS
   ══════════════════════════════════════════════════════════ */
function attachCardListeners(container) {
  container.addEventListener('click', e => {
    // Toggle expand
    const tog = e.target.closest('.card-toggle');
    if (tog) { toggleCard(tog.dataset.uid); return; }

    // Share button
    const share = e.target.closest('.btn-share');
    if (share) {
      e.preventDefault();
      shareArticle(share.dataset.url, share.dataset.title);
      return;
    }
  }, { capture: false });
}

function toggleCard(uid) {
  const exp = document.getElementById(`exp-${uid}`);
  const tog = document.getElementById(`tog-${uid}`);
  if (!exp) return;

  const opening = !exp.classList.contains('open');
  exp.classList.toggle('open', opening);
  tog.classList.toggle('open', opening);
  tog.querySelector('span').textContent = opening ? 'Less' : 'More';

  if (opening) {
    requestAnimationFrame(() => {
      exp.closest('.card')?.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    });
  }
}

function toggleDay(hdr) {
  const date     = hdr.nextElementSibling.id.replace('da-', '');
  const articles = document.getElementById(`da-${date}`);
  const caret    = hdr.querySelector('.day-caret');
  if (!articles) return;
  const hidden = articles.classList.toggle('hidden');
  caret?.classList.toggle('collapsed', hidden);
}

function shareArticle(url, title) {
  if (navigator.share) {
    navigator.share({ title: title || 'FeedlyVP article', url }).catch(() => {});
  } else {
    navigator.clipboard?.writeText(url)
      .then(() => showToast('Link copied!'))
      .catch(() => {});
  }
}

function showToast(msg) {
  const t = document.createElement('div');
  t.textContent = msg;
  Object.assign(t.style, {
    position: 'fixed', bottom: 'calc(80px + env(safe-area-inset-bottom))',
    left: '50%', transform: 'translateX(-50%)',
    background: '#1a2744', color: '#fff', padding: '10px 20px',
    borderRadius: '20px', fontSize: '13px', fontWeight: '600',
    zIndex: '9999', opacity: '0', transition: 'opacity 0.2s',
  });
  document.body.appendChild(t);
  requestAnimationFrame(() => { t.style.opacity = '1'; });
  setTimeout(() => {
    t.style.opacity = '0';
    setTimeout(() => t.remove(), 200);
  }, 2000);
}

/* ═══════════════════════════════════════════════════════════
   NAVIGATION
   ══════════════════════════════════════════════════════════ */
function goScreen(name) {
  if (APP.screen === name) return;
  APP.screen = name;

  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(`s-${name}`).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.s === name));

  if      (name === 'week')    renderWeek();
  else if (name === 'archive') renderArchive();
}

/* ═══════════════════════════════════════════════════════════
   PULL TO REFRESH
   ══════════════════════════════════════════════════════════ */
function setupPTR() {
  const scr = document.getElementById('s-today');
  const ptr = document.getElementById('ptr');
  let y0 = 0, active = false;
  const thresh = 72;

  scr.addEventListener('touchstart', e => {
    if (scr.scrollTop === 0) y0 = e.touches[0].pageY;
  }, { passive: true });

  scr.addEventListener('touchmove', e => {
    if (!y0) return;
    const dy = e.touches[0].pageY - y0;
    if (dy > 20) { active = true; ptr.classList.toggle('show', dy > thresh / 2); }
  }, { passive: true });

  scr.addEventListener('touchend', () => {
    if (active) {
      ptr.classList.remove('show');
      // reload from cached data
      try {
        const c = localStorage.getItem('fvp_data');
        if (c) {
          APP.data = JSON.parse(c).sort((a, b) => b.date > a.date ? 1 : -1);
          renderToday(); updateHeader();
        }
      } catch (_) {}
    }
    y0 = 0; active = false;
  }, { passive: true });
}

   SCROLL-BASED HEADER SHADOW
   ══════════════════════════════════════════════════════════ */
function setupHeaderShadow() {
  document.querySelectorAll('.screen').forEach(scr => {
    scr.addEventListener('scroll', () => {
      if (scr.classList.contains('active')) {
        document.getElementById('header').classList.toggle('scrolled', scr.scrollTop > 4);
      }
    }, { passive: true });
  });
}

function updateHeader() {
  const t  = todayStr();
  const d  = new Date(t + 'T12:00:00');
  document.getElementById('header-date').textContent =
    d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

  const latest = APP.data[0];
  document.getElementById('header-upd').textContent = latest
    ? (latest.date === t ? 'Updated today' : `Last: ${fmtDateMed(latest.date)}`)
    : 'No data yet';

  inp.addEventListener('input', () => {

/* ═══════════════════════════════════════════════════════════
   SERVICE WORKER
   ══════════════════════════════════════════════════════════ */
function registerSW() {
  if (!('serviceWorker' in navigator)) return;
  // Infer base path (works both at root and at /feedlydigest/)
  const base = location.pathname.includes('/feedlydigest')
    ? '/feedlydigest/'
    : '/';
  navigator.serviceWorker.register(base + 'sw.js', { scope: base })
    .catch(err => console.warn('SW:', err));
}

/* ═══════════════════════════════════════════════════════════
   INIT
   ══════════════════════════════════════════════════════════ */
function init() {
  // Merge injected data with localStorage cache (take freshest)
  const injected = (window.DIGEST_DATA || []).sort((a, b) => b.date > a.date ? 1 : -1);
  let cached = [];
  try { cached = JSON.parse(localStorage.getItem('fvp_data') || '[]'); } catch (_) {}

  // Use injected if it has data; otherwise fall back to cache
  APP.data = injected.length ? injected : cached.sort((a, b) => b.date > a.date ? 1 : -1);

  // Persist to cache
  if (APP.data.length) localStorage.setItem('fvp_data', JSON.stringify(APP.data));

  // Wire up nav
  document.getElementById('nav').addEventListener('click', e => {
    const btn = e.target.closest('.nav-btn');
    if (btn) goScreen(btn.dataset.s);
  });

  updateHeader();
  renderToday();
  setupPTR();
  setupSearch();
  setupHeaderShadow();
  registerSW();
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
